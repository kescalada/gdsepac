name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

# Shared with deploy.yml's group: both workflows push to the gh-pages
# branch, so they must queue against each other rather than race for the
# same ref (see run 29692389883). This also means preview builds for
# different PRs queue behind each other instead of running in parallel,
# which is an acceptable tradeoff for a low-traffic site.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
      - run: npm ci
        if: github.event.action != 'closed'
      - name: Validate content data
        if: github.event.action != 'closed'
        run: npm run validate
      - name: Build site with the PR-preview path prefix
        if: github.event.action != 'closed'
        run: npx eleventy
        env:
          PATH_PREFIX: /pr-preview/pr-${{ github.event.number }}/
      # Deploys ./_site to gh-pages under pr-preview/pr-N/ and comments the URL on
      # the PR (https://gdsepac.com/pr-preview/pr-N/). On PR close
      # it removes that directory automatically.
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
