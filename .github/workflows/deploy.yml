name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Never run a production deploy at the same time as another.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Validate content data
        run: npm run validate
      - name: Build site
        run: npx eleventy
        env:
          PATH_PREFIX: /gdsepac/
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # Keep the pr-preview/ directory (managed by pr-preview.yml) from being
          # wiped on a production deploy.
          keep_files: true
