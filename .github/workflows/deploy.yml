name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize with pr-preview.yml too: both workflows push to the gh-pages
# branch, and without a shared group they can race for the same ref and
# have a push rejected (see run 29692389883). Queue rather than cancel,
# since a production deploy should never be killed mid-push.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Validate content data
        run: npm run validate
      - name: Build site
        run: npx eleventy
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # Keep the pr-preview/ directory (managed by pr-preview.yml) from being
          # wiped on a production deploy.
          keep_files: true
