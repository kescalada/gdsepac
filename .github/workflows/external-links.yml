name: External link check (weekly)

# Weekly sweep of every EXTERNAL (http/https) link in the site source. Unlike the fast,
# offline internal-link gate in links.yml (which builds the site to confirm internal
# links resolve), this one hits the network, so it runs on a schedule instead of per-PR
# and never blocks a merge. Results are reported into a single rolling GitHub issue
# (labeled `link-check`): the issue is created when broken links first appear, updated in
# place on later runs, and closed automatically once every external link is healthy again.
on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: read
  issues: write

jobs:
  external-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ensure the rolling-report label exists before we look it up or attach it.
      # `--force` creates it if missing and is a no-op update if it already exists.
      - name: Ensure report label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create link-check --color FBCA04 --description "Automated external link report" --force

      - name: Check external links
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          # Scan the SOURCE directly — no build needed. lychee extracts links from the
          # Markdown, Nunjucks, YAML and JS data files under src/, and reports each broken
          # link at its source file and line (used for the clickable report). Internal
          # links (/page/, /assets/…) are root-relative: --root-dir lets lychee resolve
          # them against the repo root, then --scheme keeps only http/https, so those
          # internal links are excluded rather than checked here. (Internal-link
          # resolution is the separate, build-based job in links.yml.)
          #
          # --accept treats bot-block responses as reachable, not broken. Many resource
          # sites (mass.gov, nfb.org, aane.org, aacap.org, Cloudflare-fronted hosts) serve
          # the page to a real browser but reject automated checkers with 403/500/428/503
          # (or 999) based on TLS fingerprint / JS challenge — which no user-agent override
          # can satisfy. 429 (rate-limited) is likewise transient. Only genuinely-gone
          # results (404/410, DNS/connection failures) are left to fail.
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}
            --scheme https
            --scheme http
            --accept 200..=299,403,428,429,500,503,999
            --max-retries 2
            'src/**/*.md'
            'src/**/*.njk'
            'src/**/*.yaml'
            'src/**/*.js'
          # JSON output is post-processed by scripts/link-report.py into a concise issue
          # body (one row per broken URL, linked to its source line). A repo-root
          # .lycheeignore is auto-read to mute known false positives.
          format: json
          output: ./lychee.json
          # A report, never a gate — don't fail the job when links are broken. The
          # exit_code output still reflects whether lychee found problems.
          fail: false

      - name: Find existing report issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number=$(gh issue list --label link-check --state open --json number --jq '.[0].number // ""')
          echo "number=$number" >> "$GITHUB_OUTPUT"

      # Broken links found: render the concise Markdown report (each URL linked to its
      # source line) and create the issue, or update it in place if one is already open.
      - name: Compose issue body
        if: steps.lychee.outputs.exit_code != 0
        run: python3 scripts/link-report.py ./lychee.json > ./issue-body.md

      - name: Create or update report issue
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v6.0.0
        with:
          title: Broken external links
          content-filepath: ./issue-body.md
          issue-number: ${{ steps.issue.outputs.number }}
          labels: link-check

      # All external links healthy: if a report issue is still open, close it.
      - name: Close report issue when all links pass
        if: steps.lychee.outputs.exit_code == 0 && steps.issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ steps.issue.outputs.number }} \
            --comment "All external links passed the latest weekly check. Closing automatically."
